# Configuration de déploiement Netlify — Site Dr Mohamed Moussa
# Netlify lit ce fichier automatiquement : aucun réglage manuel de build requis.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Fonctions serverless : relais OAuth GitHub pour la connexion au backoffice /admin/.
[functions]
  directory = "netlify/functions"

# Sécurité : en-têtes recommandés pour un site médical.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache long pour les assets fingerprintés par Astro.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
