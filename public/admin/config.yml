# =====================================================================
# Backoffice — Cabinet d'Ophtalmologie Dr Mohamed Moussa
# Decap CMS : chaque sauvegarde crée un commit Git et republie le site.
# =====================================================================

backend:
  name: github
  repo: moussamed93-glitch/Site-Dr-Moussa
  branch: main
  base_url: https://dr-moussa-ophtalmologue.netlify.app
  auth_endpoint: .netlify/functions/auth
  commit_messages:
    create: 'Contenu : création de {{slug}}'
    update: 'Contenu : mise à jour de {{slug}}'
    delete: 'Contenu : suppression de {{slug}}'
    uploadMedia: 'Média : ajout de {{path}}'
    deleteMedia: 'Média : suppression de {{path}}'

locale: fr
site_url: https://dr-moussa-ophtalmologue.netlify.app
logo_url: /favicon.svg

# Les photos téléversées vont dans public/images : elles sont servies en ligne,
# donc prévisualisables dans le backoffice, et référencées via src/lib/images.ts.
media_folder: 'public/images'
public_folder: '/images'

collections:
  # ------------------------------------------------------------------
  - name: reglages
    label: 'Réglages du cabinet'
    description: 'Coordonnées, horaires, liens — affichés sur tout le site.'
    files:
      - name: settings
        label: 'Coordonnées et horaires'
        file: 'src/data/settings.json'
        fields:
          - { name: name, label: 'Nom du cabinet', widget: string }
          - { name: doctor, label: 'Nom du médecin', widget: string }
          - { name: title, label: 'Titre professionnel', widget: string }
          - { name: url, label: 'Adresse du site (URL)', widget: string }
          - { name: phone, label: 'Téléphone principal (format international)', widget: string, hint: 'Ex. +216 58 272 719' }
          - { name: phoneDisplay, label: 'Téléphone principal (affiché)', widget: string }
          - { name: phone2, label: 'Téléphone secondaire (format international)', widget: string }
          - { name: phone2Display, label: 'Téléphone secondaire (affiché)', widget: string }
          - { name: email, label: 'E-mail', widget: string }
          - { name: addressLine1, label: 'Adresse — ligne 1', widget: string }
          - { name: addressLine2, label: 'Adresse — ligne 2', widget: string }
          - { name: addressCity, label: 'Ville / quartier', widget: string }
          - { name: addressRegion, label: 'Gouvernorat', widget: string }
          - { name: addressPostalCode, label: 'Code postal', widget: string }
          - { name: addressCountry, label: 'Pays', widget: string }
          - { name: mapsUrl, label: 'Lien Google Maps (itinéraire)', widget: string }
          - { name: mapsEmbed, label: 'Lien Google Maps (carte intégrée)', widget: string }
          - { name: medtnUrl, label: 'Lien profil Med.tn', widget: string }
          - { name: googleReviewsUrl, label: 'Lien avis Google', widget: string }
          - { name: reviewCount, label: "Nombre d'avis Google (secours)", widget: number, value_type: int, hint: 'Utilisé seulement si la synchronisation automatique est indisponible.' }
          - { name: rating, label: 'Note Google sur 5 (secours)', widget: number, value_type: int, hint: 'Utilisé seulement si la synchronisation automatique est indisponible.' }
          - name: hours
            label: 'Horaires'
            widget: list
            fields:
              - { name: days, label: 'Jours', widget: string }
              - { name: time, label: 'Heures', widget: string }
          - { name: facebook, label: 'Page Facebook (URL, optionnel)', widget: string, required: false }
          - { name: instagram, label: 'Page Instagram (URL, optionnel)', widget: string, required: false }

      - name: home
        label: "Page d'accueil"
        file: 'src/data/home.json'
        fields:
          - { name: heroEyebrow, label: 'Sur-titre du bandeau', widget: string }
          - { name: heroTitle, label: 'Titre principal (1ère partie)', widget: string }
          - { name: heroTitleAccent, label: 'Titre principal (partie en italique)', widget: string }
          - { name: heroLead, label: "Texte d'introduction", widget: text }
          - { name: heroImage, label: "Photo du bandeau d'accueil", widget: image }
          - { name: heroImageAlt, label: 'Description de la photo du bandeau', widget: string }
          - { name: servicesTitle, label: 'Titre de la section Services', widget: string }
          - { name: servicesIntro, label: 'Introduction de la section Services', widget: text }
          - { name: servicesImage, label: 'Photo de la section Services', widget: image }
          - { name: servicesImageAlt, label: 'Description de la photo Services', widget: string }
          - { name: servicesCaptionNum, label: 'Chiffre mis en avant (ex. 13)', widget: string }
          - { name: servicesCaptionText, label: 'Texte à côté du chiffre', widget: string }
          - { name: medecinTitles, label: 'Titres du médecin (une ligne par titre)', widget: text }
          - { name: medecinText1, label: 'Présentation du médecin — paragraphe 1', widget: text }
          - { name: medecinText2, label: 'Présentation du médecin — paragraphe 2', widget: text }
          - { name: medecinImage, label: 'Photo du médecin (portrait)', widget: image }
          - { name: medecinImageAlt, label: 'Description du portrait', widget: string }
          - { name: trustTitle, label: 'Titre de la section Confiance', widget: string }
          - { name: trustManifesto, label: 'Texte de la section Confiance', widget: text, hint: 'Mettez un mot en **gras** avec des étoiles autour, comme ceci.' }
          - { name: trustImage, label: 'Photo de la section Confiance', widget: image }
          - { name: trustImageAlt, label: 'Description de la photo Confiance', widget: string }
          - { name: discoverTitle, label: 'Titre de la section « Découvrir »', widget: string }
          - name: discover
            label: 'Tuiles « Découvrir le cabinet »'
            label_singular: 'tuile'
            widget: list
            fields:
              - { name: image, label: 'Photo', widget: image }
              - { name: title, label: 'Titre', widget: string }
              - { name: text, label: 'Texte', widget: string }
              - { name: alt, label: 'Description de la photo (accessibilité)', widget: string }
              - name: link
                label: 'Page de destination'
                widget: select
                options:
                  - { label: 'Notre matériel', value: '/materiel/' }
                  - { label: 'Chirurgie', value: '/chirurgie/' }
                  - { label: 'Activité scientifique', value: '/activite-scientifique/' }
                  - { label: 'Le cabinet', value: '/cabinet/' }
                  - { label: 'Le médecin', value: '/le-medecin/' }
                  - { label: 'Nos services', value: '/services/' }
                  - { label: 'Blog', value: '/blog/' }
                  - { label: 'Prendre rendez-vous', value: '/rendez-vous/' }

      - name: equipments
        label: 'Notre matériel'
        file: 'src/data/equipments.json'
        fields:
          - name: equipments
            label: 'Équipements'
            widget: list
            fields:
              - { name: name, label: "Nom de l'appareil", widget: string }
              - { name: role, label: 'Sous-titre (rôle)', widget: string }
              - { name: features, label: 'Caractéristiques', widget: list, field: { name: feature, label: 'Caractéristique', widget: string } }
              - { name: benefit, label: 'Bénéfice pour le patient', widget: text }

      - name: communications
        label: 'Congrès et communications'
        file: 'src/data/communications.json'
        fields:
          - name: communications
            label: 'Communications'
            widget: list
            fields:
              - { name: image, label: 'Photo', widget: image, hint: 'Téléversez ou choisissez une photo du congrès.' }
              - { name: congress, label: 'Nom du congrès', widget: string }
              - { name: subject, label: 'Sujet de la communication', widget: string }
              - { name: year, label: 'Année', widget: string }

  # ------------------------------------------------------------------
  - name: services
    label: 'Services (13 pages)'
    label_singular: 'service'
    folder: 'src/content/services'
    create: true
    slug: '{{slug}}'
    identifier_field: title
    sortable_fields: [order, title]
    fields:
      - { name: title, label: 'Nom du service', widget: string }
      - { name: metaTitle, label: 'Titre Google (50-60 caractères)', widget: string }
      - { name: metaDescription, label: 'Description Google (150-160 caractères)', widget: text }
      - { name: intro, label: "Phrase d'introduction", widget: text }
      - { name: order, label: "Ordre d'affichage", widget: number, value_type: int }
      - { name: image, label: 'Photo du bandeau (optionnel)', widget: image, required: false, hint: 'Si vide, une photo par défaut est utilisée.' }
      - { name: symptoms, label: 'Symptômes', widget: list, field: { name: item, label: 'Symptôme', widget: string } }
      - { name: whenToConsult, label: 'Quand consulter ?', widget: list, field: { name: item, label: 'Situation', widget: string } }
      - name: treatments
        label: 'Traitements et prise en charge'
        widget: list
        fields:
          - { name: title, label: 'Titre', widget: string }
          - { name: text, label: 'Description', widget: text }
      - name: faq
        label: 'Questions fréquentes'
        widget: list
        fields:
          - { name: q, label: 'Question', widget: string }
          - { name: a, label: 'Réponse', widget: text }
      - { name: body, label: 'Texte de présentation (corps de page)', widget: markdown }

  # ------------------------------------------------------------------
  - name: blog
    label: 'Articles de blog'
    label_singular: 'article'
    folder: 'src/content/blog'
    create: true
    slug: '{{slug}}'
    identifier_field: title
    sortable_fields: [date, title]
    fields:
      - { name: title, label: "Titre de l'article", widget: string }
      - { name: description, label: 'Résumé (affiché sur Google)', widget: text }
      - { name: date, label: 'Date de publication', widget: datetime, format: 'YYYY-MM-DD', date_format: 'DD/MM/YYYY', time_format: false }
      - { name: category, label: 'Catégorie', widget: string, hint: 'Ex. Prévention, Chirurgie, Cornée, Pédiatrie' }
      - { name: body, label: "Contenu de l'article", widget: markdown }

  # ------------------------------------------------------------------
  # Chaque page = un fichier de données. Photos ET textes y sont éditables.
  - name: pages
    label: 'Pages du site'
    description: "Modifiez les photos et les textes de chaque page. Le logo reste protégé."
    files:
      - name: le-medecin
        label: 'Page « Le médecin »'
        file: 'src/data/pages/le-medecin.json'
        fields:
          - name: hero
            label: 'Bandeau (haut de page)'
            widget: object
            fields:
              - { name: image, label: 'Photo du bandeau', widget: image }
              - { name: eyebrow, label: 'Sur-titre', widget: string }
              - { name: title, label: 'Titre', widget: string }
              - { name: lead, label: "Texte d'introduction", widget: text, required: false }
          - name: bio
            label: 'Section « Parcours »'
            widget: object
            fields:
              - { name: image, label: 'Photo (portrait)', widget: image }
              - { name: imageAlt, label: 'Description de la photo', widget: string }
              - { name: eyebrow, label: 'Sur-titre', widget: string }
              - { name: title, label: 'Titre', widget: string }
              - { name: text1, label: 'Paragraphe 1', widget: text }
              - { name: text2, label: 'Paragraphe 2', widget: text }
              - name: facts
                label: 'Repères (encadré)'
                widget: list
                fields:
                  - { name: label, label: 'Intitulé', widget: string }
                  - { name: value, label: 'Valeur', widget: string }
          - name: science
            label: 'Section « Science »'
            widget: object
            fields:
              - { name: eyebrow, label: 'Sur-titre', widget: string }
              - { name: title, label: 'Titre', widget: string }
              - { name: text1, label: 'Paragraphe 1', widget: text }
              - { name: text2, label: 'Paragraphe 2', widget: text }
              - { name: image, label: 'Photo', widget: image }
              - { name: imageAlt, label: 'Description de la photo', widget: string }

      - name: cabinet
        label: 'Page « Le cabinet »'
        file: 'src/data/pages/cabinet.json'
        fields:
          - name: hero
            label: 'Bandeau (haut de page)'
            widget: object
            fields:
              - { name: image, label: 'Photo du bandeau', widget: image }
              - { name: eyebrow, label: 'Sur-titre', widget: string }
              - { name: title, label: 'Titre', widget: string }
              - { name: lead, label: "Texte d'introduction", widget: text, required: false }
          - name: gallery
            label: 'Galerie photos du cabinet'
            label_singular: 'photo'
            widget: list
            fields:
              - { name: image, label: 'Photo', widget: image }
              - { name: alt, label: 'Description (accessibilité / SEO)', widget: string }
              - { name: caption, label: 'Légende (affichée sous la photo)', widget: string }

      - name: chirurgie
        label: 'Page « Chirurgie »'
        file: 'src/data/pages/chirurgie.json'
        fields:
          - name: hero
            label: 'Bandeau (haut de page)'
            widget: object
            fields:
              - { name: image, label: 'Photo du bandeau', widget: image }
              - { name: eyebrow, label: 'Sur-titre', widget: string }
              - { name: title, label: 'Titre', widget: string }
              - { name: lead, label: "Texte d'introduction", widget: text, required: false }
          - name: surgery
            label: 'Colonnes chirurgie'
            widget: list
            fields:
              - { name: num, label: 'Numéro (ex. 01)', widget: string }
              - { name: title, label: 'Titre', widget: string }
              - { name: text1, label: 'Paragraphe 1', widget: text, hint: 'Gras avec **étoiles**.' }
              - { name: text2, label: 'Paragraphe 2', widget: text }
              - { name: linkLabel, label: 'Texte du lien', widget: string }
              - { name: link, label: 'Adresse du lien', widget: string }
          - { name: blocEyebrow, label: 'Sur-titre section bloc', widget: string }
          - { name: blocTitle, label: 'Titre section bloc', widget: string }
          - { name: blocNote, label: 'Note sous les photos du bloc', widget: text }
          - name: blocPhotos
            label: 'Photos du bloc opératoire'
            label_singular: 'photo'
            widget: list
            fields:
              - { name: image, label: 'Photo', widget: image }
              - { name: alt, label: 'Description (accessibilité / SEO)', widget: string }

      - name: materiel
        label: 'Page « Notre matériel »'
        file: 'src/data/pages/materiel.json'
        fields:
          - name: hero
            label: 'Bandeau (haut de page)'
            widget: object
            fields:
              - { name: image, label: 'Photo du bandeau', widget: image }
              - { name: eyebrow, label: 'Sur-titre', widget: string }
              - { name: title, label: 'Titre', widget: string }
              - { name: lead, label: "Texte d'introduction", widget: text, required: false }
          - { name: pratiqueEyebrow, label: 'Sur-titre « En pratique »', widget: string }
          - { name: pratiqueTitle, label: 'Titre « En pratique »', widget: string }
          - { name: pratiqueText1, label: 'Paragraphe 1', widget: text }
          - { name: pratiqueText2, label: 'Paragraphe 2', widget: text }
          - { name: pratiqueImage, label: 'Photo « En pratique »', widget: image }
          - { name: pratiqueImageAlt, label: 'Description de la photo', widget: string }

      - name: activite
        label: 'Page « Activité scientifique »'
        file: 'src/data/pages/activite-scientifique.json'
        fields:
          - name: hero
            label: 'Bandeau (haut de page)'
            widget: object
            fields:
              - { name: image, label: 'Photo du bandeau', widget: image }
              - { name: eyebrow, label: 'Sur-titre', widget: string }
              - { name: title, label: 'Titre', widget: string }
              - { name: lead, label: "Texte d'introduction", widget: text, required: false }
          - name: pillars
            label: 'Piliers (3 blocs)'
            widget: list
            fields:
              - { name: num, label: 'Numéro (ex. 01)', widget: string }
              - { name: title, label: 'Titre', widget: string }
              - { name: text, label: 'Texte', widget: text }
          - { name: commsEyebrow, label: 'Sur-titre section communications', widget: string }
          - { name: commsTitle, label: 'Titre section communications', widget: string }

      - name: contact
        label: 'Page « Contact »'
        file: 'src/data/pages/contact.json'
        fields:
          - name: hero
            label: 'Bandeau (haut de page)'
            widget: object
            fields:
              - { name: image, label: 'Photo du bandeau', widget: image }
              - { name: eyebrow, label: 'Sur-titre', widget: string }
              - { name: title, label: 'Titre', widget: string }
          - { name: formTitle, label: 'Titre du formulaire', widget: string }
          - { name: formIntro, label: 'Texte au-dessus du formulaire', widget: text, hint: 'Gras avec **étoiles**.' }

      - name: rendez-vous
        label: 'Page « Prendre rendez-vous »'
        file: 'src/data/pages/rendez-vous.json'
        fields:
          - name: hero
            label: 'Bandeau (haut de page)'
            widget: object
            fields:
              - { name: image, label: 'Photo du bandeau', widget: image }
              - { name: eyebrow, label: 'Sur-titre', widget: string }
              - { name: title, label: 'Titre', widget: string }
              - { name: lead, label: "Texte d'introduction", widget: text, required: false }
          - { name: phoneTitle, label: 'Bloc 1 — titre', widget: string }
          - { name: phoneText, label: 'Bloc 1 — texte', widget: text }
          - { name: medtnTitle, label: 'Bloc 2 — titre', widget: string }
          - { name: medtnText, label: 'Bloc 2 — texte', widget: text }
          - { name: formTitle, label: 'Bloc 3 — titre', widget: string }
          - { name: formText, label: 'Bloc 3 — texte', widget: text }
          - { name: prepaTitle, label: 'Préparer votre venue — titre', widget: string }
          - name: prepaItems
            label: 'Préparer votre venue — liste'
            widget: list
            field: { name: item, label: 'Élément', widget: string }
          - { name: prepaNote, label: 'Préparer votre venue — note', widget: text }

      - name: services-index
        label: 'Page « Nos services » (liste)'
        file: 'src/data/pages/services.json'
        fields:
          - name: hero
            label: 'Bandeau (haut de page)'
            widget: object
            fields:
              - { name: image, label: 'Photo du bandeau', widget: image }
              - { name: eyebrow, label: 'Sur-titre', widget: string }
              - { name: title, label: 'Titre', widget: string }
              - { name: lead, label: "Texte d'introduction", widget: text, required: false }

      - name: blog-index
        label: 'Page « Blog » (liste)'
        file: 'src/data/pages/blog.json'
        fields:
          - name: hero
            label: 'Bandeau (haut de page)'
            widget: object
            fields:
              - { name: image, label: 'Photo du bandeau', widget: image }
              - { name: eyebrow, label: 'Sur-titre', widget: string }
              - { name: title, label: 'Titre', widget: string }
              - { name: lead, label: "Texte d'introduction", widget: text, required: false }

      - name: ophtalmologue-mnihla
        label: 'Page locale « Ophtalmologue à Mnihla »'
        file: 'src/data/pages/ophtalmologue-mnihla.json'
        fields:
          - name: hero
            label: 'Bandeau (haut de page)'
            widget: object
            fields:
              - { name: image, label: 'Photo du bandeau', widget: image }
              - { name: eyebrow, label: 'Sur-titre', widget: string }
              - { name: title, label: 'Titre', widget: string }
              - { name: lead, label: "Texte d'introduction", widget: text, required: false }
          - { name: locationTitle, label: 'Localisation — titre', widget: string }
          - { name: locationText, label: 'Localisation — texte', widget: text }
          - { name: zonesTitle, label: 'Quartiers — titre', widget: string }
          - { name: zonesText, label: 'Quartiers — texte', widget: text }
          - name: zones
            label: 'Quartiers desservis'
            widget: list
            field: { name: quartier, label: 'Quartier', widget: string }
          - { name: comingTitle, label: 'Comment venir — titre', widget: string }
          - { name: comingText1, label: 'Comment venir — paragraphe 1', widget: text, hint: 'Gras avec **étoiles**.' }
          - { name: comingText2, label: 'Comment venir — paragraphe 2', widget: text, hint: 'Gras avec **étoiles**.' }
          - { name: coordsTitle, label: 'Coordonnées — titre', widget: string }
